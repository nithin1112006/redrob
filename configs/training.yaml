# Training Configuration for Qwen Phase 2 Explanation Model

model:
  base_model_name: "Qwen/Qwen3-4B-Instruct"  # Target base model name (falls back gracefully to configurable models)
  trust_remote_code: true
  use_cache: false

training:
  output_dir: "./checkpoints"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1e-8
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  logging_dir: "./outputs/logs"
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  save_total_limit: 3
  seed: 42
  bf16: true                    # Will automatically check and fallback if not supported
  fp16: false
  gradient_checkpointing: true
  ddp_find_unused_parameters: false
  optim: "paged_adamw_8bit"

dataset:
  max_seq_length: 4096
  packing: true                 # Sequence packing for SFT training efficiency
